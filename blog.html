---
layout: default
title: Blog
---

<h1 class="title">Latest Posts</h1>

<div class="post-list">
  {% if site.posts.size > 0 %}
    {% for post in site.posts %}
      <div class="post">
        <h2><a href="{{ post.url }}">{{ post.title }}</a></h2>
        <p>{{ post.excerpt }}</p>
      </div>
    {% endfor %}
  {% else %}
      <h2>No posts found</h2>
  {% endif %}
</div>
