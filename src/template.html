<!doctype html>
<html>
<head>
	<meta charset='utf-8'>
	<meta name='viewport' content='width=device-width,initial-scale=1.0'>
	<meta name='theme-color' content='#333333'>

	<!-- START Open Graph Tags -->
	<meta property="og:title" content="Chris Watson - Designer, Developer, Open Sorcerer" />
	<meta property="og:type" content="website" />
	<meta property="og:url" content="https://watzon.tech" />
	<meta property="og:image" content="https://watzon.tech/images/banner.png" />
	<!-- END Open Graph Tags -->

	<!-- START Twitter card tags -->
	<meta property="twitter:card" content="summary "/>
	<meta property="twitter:creator" content="@_watzon" />
	<meta property="twitter:description" content="Chris Watson is a full stack engineer with 9 years of experience and a passion for open source" />
	<meta property="twitter:title" content="Chris Watson - Designer, Developer, Open Sorcerer" />
	<meta property="twitter:image" content="https://watzon.tech/images/banner.png" />
	<!-- END Twitter card tags -->

	%sapper.base%

	<link rel='manifest' href='manifest.json'>
	<link rel='icon' type='image/png' href='favicon.png'>

	<!-- Sapper generates a <style> tag containing critical CSS
	     for the current page. CSS for the rest of the app is
	     lazily loaded when it precaches secondary pages -->
	%sapper.styles%

	<!-- This contains the contents of the <svelte:head> component, if
	     the current page has one -->
	%sapper.head%
</head>
<body>
	<!-- The application will be rendered inside this element,
	     because `app/client.js` references it -->
	<div id='sapper'>%sapper.html%</div>

	<!-- Sapper creates a <script> tag containing `app/client.js`
	     and anything else it needs to hydrate the app and
	     initialise the router -->
	%sapper.scripts%
</body>
</html>
